<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equalize — Offline</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #f2efe5;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 31px,
        #c9c3b0 31px,
        #c9c3b0 32px
      );
      color: #1c503f;
      font-family: Georgia, 'Times New Roman', Times, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .card {
      background-color: rgba(242, 239, 229, 0.92);
      border: 1.5px solid #c9c3b0;
      border-radius: 4px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(28, 80, 63, 0.08);
    }

    .logo {
      display: block;
      margin: 0 auto 1.5rem;
    }

    .app-name {
      font-family: Georgia, serif;
      font-size: 0.75rem;
      font-weight: normal;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #1c503f;
      opacity: 0.6;
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1.5px solid #c9c3b0;
      margin: 0 auto 2rem;
      width: 80%;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 1.75rem;
      font-weight: normal;
      color: #1c503f;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    p {
      font-family: Georgia, serif;
      font-size: 0.95rem;
      color: #1c503f;
      opacity: 0.8;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .status-label {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1c503f;
      opacity: 0.5;
      margin-bottom: 2.5rem;
      display: block;
    }

    .retry-btn {
      display: inline-block;
      background-color: #ef9b0d;
      color: #1a1a0e;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
    }

    .retry-btn:hover {
      background-color: #d88a00;
    }

    .retry-btn:active {
      transform: translateY(1px);
    }

    .footer-note {
      margin-top: 2rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: #1c503f;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Equalize logo: coin with equals sign (inline SVG) -->
    <svg
      class="logo"
      xmlns="http://www.w3.org/2000/svg"
      width="56"
      height="56"
      viewBox="0 0 56 56"
      aria-label="Equalize logo"
    >
      <rect width="56" height="56" rx="12" fill="#1c503f" />
      <g transform="translate(5, 5) scale(1.917)">
        <circle
          cx="12" cy="12" r="9"
          stroke="#f2efe5"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <line x1="8.5" y1="9.75" x2="15.5" y2="9.75" stroke="#f2efe5" stroke-width="2" stroke-linecap="round" />
        <line x1="8.5" y1="14.25" x2="15.5" y2="14.25" stroke="#f2efe5" stroke-width="2" stroke-linecap="round" />
      </g>
    </svg>

    <p class="app-name">Equalize</p>

    <hr class="divider" />

    <h1>You're offline</h1>

    <p>No connection — your khata will sync when you're back online.</p>

    <span class="status-label">Connection lost</span>

    <button class="retry-btn" onclick="location.reload()">
      Try again
    </button>

    <p class="footer-note">Your data is safe and waiting.</p>
  </div>
</body>
</html>
